<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#363636">
  <title>Connexion — Pontons</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="manifest" href="/static/manifest.json">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .login-wrap { width: 100%; max-width: 400px; }
  </style>
</head>
<body class="has-background-light">

  <div class="login-wrap">

    <!-- Brand -->
    <div class="has-text-centered mb-5">
      <span class="icon is-large has-background-dark has-text-white"
            style="border-radius:14px;width:52px;height:52px;font-size:1.3rem;">
        <i class="fas fa-water"></i>
      </span>
      <h1 class="title is-5 mt-3 mb-1">Gestionnaire Pontons</h1>
      <p class="has-text-grey is-size-7">Location d'embarcations</p>
    </div>

    <!-- Carte -->
    <div class="card">
      <div class="card-content">

        {% if form.errors %}
          <div class="notification is-danger is-light mb-4">
            <span class="icon"><i class="fas fa-circle-exclamation"></i></span>
            Identifiant ou mot de passe incorrect.
          </div>
        {% endif %}

        <form method="post">
          {% csrf_token %}

          <div class="field mb-4">
            <label class="label">Identifiant</label>
            <div class="control has-icons-left">
              <input class="input" type="text" name="username"
                     autofocus autocomplete="username" placeholder="Votre identifiant">
              <span class="icon is-small is-left"><i class="fas fa-user"></i></span>
            </div>
          </div>

          <div class="field mb-5">
            <label class="label">Mot de passe</label>
            <div class="control has-icons-left">
              <input class="input" type="password" name="password"
                     autocomplete="current-password" placeholder="••••••••">
              <span class="icon is-small is-left"><i class="fas fa-lock"></i></span>
            </div>
          </div>

          <input type="hidden" name="next" value="{{ next }}">

          <div class="field">
            <div class="control">
              <button type="submit" class="button is-dark is-fullwidth">
                <span class="icon"><i class="fas fa-right-to-bracket"></i></span>
                <span>Se connecter</span>
              </button>
            </div>
          </div>
        </form>

        <div class="has-text-centered mt-4">
          <a href="{% url 'planning' %}" class="has-text-grey is-size-7">
            <span class="icon"><i class="fas fa-eye"></i></span>
            Voir le planning sans connexion
          </a>
        </div>

      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator)
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
  </script>
</body>
</html>
