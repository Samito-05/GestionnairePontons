<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#00b4d8">
  <title>Connexion — Pontons</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="manifest" href="/static/manifest.json">
  <style>
    body {
      background: linear-gradient(135deg, #0077b6 0%, #00b4d8 60%, #90e0ef 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      overflow: hidden;
      max-width: 420px;
      width: 100%;
    }
    .login-header {
      background: linear-gradient(135deg, #023e8a, #0077b6);
      padding: 2.5rem 2rem;
      text-align: center;
      color: white;
    }
    .login-header .icon-big { font-size: 3rem; margin-bottom: 0.5rem; }
    .login-body { padding: 2rem; background: white; }
    .button.is-login {
      background: linear-gradient(135deg, #0077b6, #00b4d8);
      color: white;
      border: none;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .button.is-login:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="icon-big"><i class="fas fa-water"></i></div>
      <h1 class="title has-text-white is-4 mb-1">Gestionnaire Pontons</h1>
      <p class="has-text-white-ter is-size-7">Location d'embarcations</p>
    </div>
    <div class="login-body">
      {% if form.errors %}
        <div class="notification is-danger is-light mb-4">
          <span class="icon"><i class="fas fa-exclamation-circle"></i></span>
          Identifiant ou mot de passe incorrect.
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="field">
          <label class="label">Identifiant</label>
          <div class="control has-icons-left">
            <input class="input" type="text" name="username" autofocus autocomplete="username" placeholder="Votre identifiant">
            <span class="icon is-small is-left"><i class="fas fa-user"></i></span>
          </div>
        </div>
        <div class="field">
          <label class="label">Mot de passe</label>
          <div class="control has-icons-left">
            <input class="input" type="password" name="password" autocomplete="current-password" placeholder="••••••••">
            <span class="icon is-small is-left"><i class="fas fa-lock"></i></span>
          </div>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <div class="field mt-5">
          <div class="control">
            <button type="submit" class="button is-login is-fullwidth is-medium">
              <span class="icon"><i class="fas fa-sign-in-alt"></i></span>
              <span>Se connecter</span>
            </button>
          </div>
        </div>
      </form>

      <div class="has-text-centered mt-4">
        <a href="{% url 'planning' %}" class="has-text-grey is-size-7">
          <span class="icon"><i class="fas fa-eye"></i></span>
          Voir le planning sans connexion
        </a>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
